<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DriveStudio - File Transfer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(0, 0, 0, 0.35);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 32px;
            color: #fff;
        }

        p {
            margin-bottom: 30px;
            font-size: 16px;
            color: #dcdcdc;
        }

        input[type="file"] {
            display: none;
        }

        label.upload-btn {
            background-color: #2980b9;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        label.upload-btn:hover {
            background-color: #3498db;
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>DriveStudio</h1>
    <p>Încarcă fișiere rapid și generează un link pentru descărcare</p>

    <form action="/api/files/upload" method="post" enctype="multipart/form-data">
        <label for="fileUpload" class="upload-btn">Selectează fișier</label>
        <input id="fileUpload" type="file" name="file" onchange="this.form.submit()" />
    </form>

    <footer>
        Powered by Slavon
    </footer>
</div>
</body>
</html>
