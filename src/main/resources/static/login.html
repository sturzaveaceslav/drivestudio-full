<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Login - DriveStudio</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <img src="/img/logo.png" alt="DriveStudio Logo" class="logo">
    <h1>Autentificare</h1>

    <form id="login-form">
        <input type="text" id="login-username" placeholder="Username" required><br><br>
        <input type="password" id="login-password" placeholder="Parolă" required><br><br>
        <button type="submit">Login</button>
    </form>

    <p>Nu ai cont? <a href="register.html">Înregistrează-te aici</a></p>
</div>

<footer>Powered by Slavon</footer>

<script src="/app.js"></script>
</body>
</html>
