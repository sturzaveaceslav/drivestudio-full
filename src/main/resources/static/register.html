<!DOCTYPE html>
<html lang="ro">
<head>

  <title>Înregistrare - DriveStudio</title>

</head>
<body>
<div class="container">
  <img src="/img/logo.png" alt="DriveStudio Logo" class="logo">

  <p>Ai deja cont? <a href="login.html">Autentifică-te aici</a></p>
</div>

<footer>Powered by Slavon</footer>

<script src="/app.js"></script>

</html>
